services:
  cita-tie:
    image: ghcr.io/nsoult-agentic/cita-tie:sha-2e43197
    container_name: cita-tie
    restart: unless-stopped
    ports:
      # Bind to the NUC's LAN IP so the SMS-code entry page is reachable from
      # Neil's phone on the LAN (127.0.0.1 was loopback-only — unreachable from a phone).
      - "172.16.10.25:8085:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    volumes:
      - /srv/cita-tie/secrets:/secrets:ro
      - /srv/cita-tie/data:/app/data
    tmpfs:
      # mode=1777 so UID 1200 can create /tmp/.X11-unix + Firefox temp profiles;
      # exec so geckodriver/Firefox temp executables aren't blocked by noexec.
      - /tmp:size=256m,mode=1777,exec
    environment:
      - TZ=Europe/Madrid
      - SECRETS_DIR=/secrets
      # OFFICES: leave EMPTY for non-Barcelona provinces. The Office enum only holds
      # Barcelona-province offices; their value codes can collide with a different
      # province's dropdown and book an unintended office. Empty => auto-select an
      # office from the live page. For BARCELONA, restore the comma-separated list.
      - OFFICES=
      - OPERATION_CODE=TOMA_HUELLAS
      # Target province. Default BARCELONA (in code). Currently TARRAGONA (has availability).
      - PROVINCE=TARRAGONA
      # Pause the automated polling loop; run as a remote-orchestration server only
      # (control API on /control/*). Set false to resume automated booking.
      - ORCHESTRATE_ONLY=true
      - SMS_CODE_PORT=8080
      # Host-published URL for the SMS-code entry page — must match the published host
      # port below (8085), NOT the in-container SMS_CODE_PORT. Reachable from the LAN.
      - SMS_PUBLIC_URL=http://172.16.10.25:8085
      - HOT_CYCLES=12
      # Step 2: drive the long-lived cita-browser via Remote WebDriver so code
      # redeploys reattach the existing (Cl@ve-authed) session instead of restarting it.
      - WEBDRIVER_URL=http://cita-browser:4444
      # - FINGERPRINT_TEST=1  # uncomment to run fingerprint audit
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cita-net
    depends_on:
      - cita-browser

  # Long-lived browser — holds the Cl@ve-authenticated Firefox session. The
  # cita-tie code container connects to it via Remote WebDriver and re-attaches
  # the session, so redeploying the CODE never restarts the browser (one QR scan
  # survives code iterations). CI only bumps the cita-tie image line, so GitOps
  # leaves this service running.
  cita-browser:
    image: selenium/standalone-firefox:latest
    container_name: cita-browser
    restart: unless-stopped
    shm_size: 2g
    ports:
      - "172.16.10.25:4444:4444"   # WebDriver endpoint (LAN)
      - "172.16.10.25:7900:7900"   # noVNC — watch the browser / scan the Cl@ve QR
    environment:
      - TZ=Europe/Madrid
      - SE_NODE_SESSION_TIMEOUT=999999999  # do NOT reap our idle Cl@ve session (-1 wrongly dies in 30s)
      - SE_NODE_MAX_SESSIONS=1
      - SE_SCREEN_WIDTH=1920
      - SE_SCREEN_HEIGHT=1080
    networks:
      - cita-net

networks:
  cita-net: {}
