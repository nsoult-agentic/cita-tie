services:
  cita-tie:
    image: ghcr.io/nsoult-agentic/cita-tie:sha-1d1030b
    container_name: cita-tie
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    volumes:
      - /srv/cita-tie/secrets:/secrets:ro
      - /srv/cita-tie/data:/app/data
    tmpfs:
      - /tmp:size=256m
    environment:
      - TZ=Europe/Madrid
      - SECRETS_DIR=/secrets
      - OFFICES=BARCELONA,BADALONA,HOSPITALET,CORNELLA,SANTADRIA
      - OPERATION_CODE=TOMA_HUELLAS
      - SMS_CODE_PORT=8080
    shm_size: "2gb"
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
