name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "bcncita/**"
      - "run.py"
      - "Dockerfile"
      - "requirements.txt"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cita-tie:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/cita-tie:latest

      - name: Update docker-compose.yml with new image tag
        run: |
          sed -i "s|image:.*cita-tie.*|image: ghcr.io/${{ github.repository_owner }}/cita-tie:sha-${{ steps.sha.outputs.short }}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --cached --quiet || git commit -m "ci: update image to sha-${{ steps.sha.outputs.short }} [skip ci]"
          git push
